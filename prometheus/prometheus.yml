global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'esb-gateway'
    static_configs:
      - targets: ['esb-gateway:4000']

  - job_name: 'inventory-service'
    static_configs:
      - targets: ['inventory-service:3001']

  - job_name: 'payment-service'
    static_configs:
      - targets: ['payment-service:3002']

  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:3003']
